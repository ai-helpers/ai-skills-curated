name: Install project
description: Set up Python, uv, and the project environment for repo automation.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.11"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Show tool versions
      shell: bash
      run: |
        python --version
        uv --version

    - name: Install project dependencies
      shell: bash
      run: uv sync
